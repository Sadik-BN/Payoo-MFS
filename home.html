<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- tailwindCss + daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisyUi all themes -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>

    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <title>Payoo | Home</title>
</head>

<body class="min-h-screen max-w-md mx-auto bg-base-200">
    <header class="border-b border-gray-200 sticky top-0 bg-base-200 z-10">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <div class="left flex gap-2">
                <div class="logo h-[48px] w-[60px]">
                    <img src="./assets/logo.png" alt="">
                </div>
                <div class="balance">
                    <h3 class="text-[18px] font-extrabold"> $<span id="usr-balance"></span></h3>
                    <p class="text-[14px] font-normal text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <button id="logout-btn" class="btn text-neutral/50 font-normal text-[14px]">
                    <i class="fa-solid fa-arrow-right-from-bracket fa-flip-horizontal fa-xs text-neutral/50"></i>
                    Logout
                </button>
            </div>
        </section>
    </header>
    <section class="w-11/12 mx-auto mt-8">
        <h2 class="font-bold text-[24px]">Welcome to Pay<span class="text-primary/90">oo</span></h2>
        <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low.</p>

        <div class="buttons grid grid-cols-3 gap-3 mt-6">
            <button class="btn btn-primary btn-soft flex-col h-full py-4">
                <img src="./assets/opt-1.png" alt="">
                <p class="text-[14px] font-normal">Add Money</p>
            </button>
            <button id="cashout-btn" class="btn btn-primary btn-soft flex-col h-full py-4">
                <img src="./assets/opt-2.png" alt="">
                <p class="text-[14px] font-normal">Cashout</p>
            </button>
            <button class="btn btn-primary btn-soft flex-col h-full py-4">
                <img src="./assets/opt-3.png" alt="">
                <p class="text-[14px] font-normal">Transfer Money</p>
            </button>
            <button id="get-bonus-btn" class="btn btn-primary btn-soft flex-col h-full py-6">
                <img src="./assets/opt-4.png" alt="">
                <p class="text-[14px] font-normal">Get Bonus</p>
            </button>
            <button class="btn btn-primary btn-soft flex-col h-full py-6">
                <img src="./assets/opt-5.png" alt="">
                <p class="text-[14px] font-normal">Pay Bill</p>
            </button>
            <button class="btn btn-primary btn-soft flex-col h-full py-6">
                <img src="./assets/opt-6.png" alt="">
                <p class="text-[14px] font-normal">Transactions</p>
            </button>
        </div>
    </section>

    <section id="cashout" class="w-11/12 mx-auto mt-6 space-y-6 pt-6" hidden>
        <h1 class="text-[18px] font-semibold">Cash Out</h1>
        <fieldset class="mx-auto fieldset bg-base-200 border-base-300 rounded-box w-full border p-4 shadow">

            <label class="label font-medium text-neutral/70">Agent Number</label>
            <input id="cashout-agent-field" type="text" maxlength="11" minlength="11" class="input w-full rounded-full"
                placeholder="Enter 11 digit number" />
            <label class="label font-medium text-neutral/70">Amount</label>
            <input id="cashout-amount-field" type="number" class="input w-full rounded-full"
                placeholder="Enter amount to withdraw" />

            <label class="label font-medium text-neutral/70">Pin Number</label>
            <input id="cashout-pin-field" maxlength="4" minlength="4" type="password" class="input w-full rounded-full"
                placeholder="Enter 4 Digit Pin Number" value="1234" />

            <button id="withdraw-btn" class="btn btn-primary rounded-full mt-4">Withdraw Money</button>
        </fieldset>
    </section>


    <section id="get-bonus" class="w-11/12 mx-auto mt-6 space-y-6 pt-6" hidden>
        <h1 class="text-[18px] font-semibold">Get Bonus</h1>
        <fieldset class="mx-auto fieldset bg-base-200 border-base-300 rounded-box w-full border p-4 shadow">
            <label class="label font-medium text-neutral/70">Enter Bonus Coupon</label>
            <input type="text" class="input w-full rounded-full" placeholder="Enter your coupon" value="payoo2026" />
            <button id="getbonus-btn" class="btn btn-primary rounded-full mt-4">Get Bonus</button>
        </fieldset>

    </section>
    <script src=".//scripts/helpers.js"></script>
    <script src="./scripts/home.js"></script>
    <script src="./scripts/main.js"></script>
</body>

</html>
