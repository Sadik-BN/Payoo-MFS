<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- tailwindCss + daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisyUi all themes -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>

    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <title>Payoo | Login</title>
</head>

<body class="min-h-screen max-w-md mx-auto bg-base-200">

    <div class="logo w-[263px] mx-auto pt-32">
        <img src="./assets/Logo-full.png" alt="Payoo logo">
    </div>
    <div class="login-form mt-8">
        <fieldset class="mx-auto fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 shadow">

            <label class="label font-medium text-black">Mobile Number</label>
            <input id="num-field" type="text" maxlength="11" minlength="11" class="input rounded-full"
                placeholder="Enter your number" value="01234567891" />

            <label class="label font-medium text-black">4 Digit Pin</label>
            <input id="pin-field" maxlength="4" minlength="4" type="password" class="input rounded-full"
                placeholder="Enter 4 Digit Pin" />

            <button id="login-btn" class="btn btn-primary rounded-full mt-4">Login</button>
        </fieldset>
    </div>
    <script src="scripts/login.js"></script>
</body>

</html>
